# ACT Training Configuration

model:
  dim_model: 256
  n_heads: 8
  n_encoder_layers: 4
  n_decoder_layers: 4
  chunk_size: 20

training:
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.00001
  num_epochs: 200
  device: "cuda"

data:
  dataset_path: "data/demonstrations/so100_pick_place"
  fps: 20

output:
  dir: "models/trained/act_arm"

evaluation:
  num_episodes: 100
  max_steps: 500
  success_threshold: 0.03
