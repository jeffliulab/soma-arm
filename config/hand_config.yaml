# LEAP Hand v2 Configuration

hand:
  name: "LEAP Hand v2"
  num_dofs: 16
  fingers:
    thumb: [thumb_abd, thumb_mcp, thumb_pip, thumb_dip]
    index: [index_abd, index_mcp, index_pip, index_dip]
    middle: [middle_abd, middle_mcp, middle_pip, middle_dip]
    ring: [ring_abd, ring_mcp, ring_pip, ring_dip]

retargeting:
  joint_min: 0.0
  joint_max: 1.5708  # pi/2
  smooth_factor: 0.4
  curl_sensitivity: 2.0
  spread_sensitivity: 1.5
