# ANIMA Skill Registry
# Each skill maps to a ROS 2 action/service

skills:
  detect_object:
    description: "Detect and locate objects using camera"
    ros_interface: "service"
    service_name: "/detect_objects"
    timeout_sec: 10.0
    affordance_check:
      - "camera_available"
      - "sufficient_lighting"
    preconditions:
      - "camera_active"
    effects:
      - "object_detected"
      - "object_position_known"

  navigate_to:
    description: "Navigate to a named location"
    ros_interface: "action"
    action_name: "/navigate_to_pose"
    timeout_sec: 60.0
    affordance_check:
      - "location_known"
      - "path_not_blocked"
      - "localization_confident"
    preconditions:
      - "map_available"
      - "localization_active"
    effects:
      - "robot_at(location)"

  pick_object:
    description: "Pick up an object using the arm"
    ros_interface: "action"
    action_name: "/pick_object"
    timeout_sec: 30.0
    constraints:
      max_weight_kg: 0.5
      grasp_type: "top_down"
    affordance_check:
      - "object_detected"
      - "object_within_reach"
      - "object_weight_under_limit"
    preconditions:
      - "object_detected"
      - "robot_near_object"
    effects:
      - "holding(object)"

  place_object:
    description: "Place an object at a destination"
    ros_interface: "action"
    action_name: "/place_object"
    timeout_sec: 30.0
    affordance_check:
      - "holding_object"
      - "destination_within_reach"
      - "destination_clear"
    preconditions:
      - "holding(object)"
      - "robot_near_destination"
    effects:
      - "object_at(destination)"
      - "not holding(object)"

  say:
    description: "Report status to user"
    ros_interface: "topic"
    topic_name: "/anima_status"
    affordance_check:
      - "communication_channel_active"
    preconditions: []
    effects:
      - "user_informed(message)"

# Known locations in the environment (semantic map)
# In production, these come from SLAM + semantic labeling
locations:
  table:
    x: 1.0
    y: 0.5
    frame: "map"
    description: "The table with objects"

  storage_box:
    x: -0.5
    y: -1.0
    frame: "map"
    description: "Green storage box on the floor"

  center:
    x: 0.0
    y: 0.0
    frame: "map"
    description: "Center of the room"
